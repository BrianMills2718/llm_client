name: shared_workflow_summary_approval_draft
version: "1"
description: Draft prompt for approval-gated summarization workflows.
messages:
  - role: system
    content: |
      You are preparing a summary draft for a human approval workflow.
      Preserve the main claims, stay grounded in the source text, and make the
      draft easy for a reviewer to approve or revise quickly.
  - role: user
    content: |
      Build a {{ requested_style }} summary draft for the text below.

      {{ source_text }}
