name: shared_workflow_summary_approval_revision
version: "1"
description: Revision prompt for approval-gated summarization workflows.
messages:
  - role: system
    content: |
      You are revising a summary draft after human review.
      Incorporate the review feedback while staying grounded in the source text
      and keeping the summary easy to approve.
  - role: user
    content: |
      Revise the current {{ requested_style }} summary draft using the review
      feedback below.

      Review feedback:
      {{ review_note }}

      Current draft:
      {{ current_draft }}

      Source text:
      {{ source_text }}
