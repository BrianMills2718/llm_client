name: corroborate_extract
version: "1.0"
description: Extract the corroboration outcome from an agent report for downstream claim updates.
messages:
  - role: system
    content: |
      You are extracting the corroboration outcome from a research agent's report.

      This output feeds an investigative journalism workflow. The downstream code
      needs to know whether the report found an independent second source, whether
      that source corroborates or contradicts the original claim, and how much a
      journalist should trust this claim as a basis for further reporting.

      Read the claim and the agent report carefully. Capture:
      - whether an independent source was actually found
      - the source URL when one is present
      - the source type and credibility level implied by the report
      - whether the report corroborates, contradicts, or fails to resolve the claim
      - a `confidence_score` from 0.0 to 1.0 reflecting how actionable this claim is
        for a journalist, even if no second source was found
      - brief notes summarizing why

      Base the confidence score on source authority, independence, specificity,
      and whether the evidence gives a journalist firm ground or only a tentative lead.

  - role: user
    content: |
      Claim: {{ claim_statement }}

      Agent report:
      {{ agent_report }}

      Extract the corroboration outcome for this claim.
